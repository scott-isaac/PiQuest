<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Quest</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>Pi Quest</h1>
  <p class="subtitle">Memorize 100 digits of Pi, one quest at a time</p>

  <!-- Setup Screen -->
  <div id="setup-screen" class="screen active">
    <button class="mode-btn" data-mode="1">
      <span class="label">Normal</span><br>
      <span class="desc">Full milestone hints to guide your memory</span>
    </button>
    <button class="mode-btn" data-mode="2">
      <span class="label">Hard</span><br>
      <span class="desc">Only emoji clues &mdash; the rest is up to you</span>
    </button>
    <button class="mode-btn" data-mode="3">
      <span class="label">Full</span><br>
      <span class="desc">No hints at all &mdash; pure recall</span>
    </button>
    <label class="sound-toggle">
      <input type="checkbox" id="sound-check" checked> Enable sound effects
    </label>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="step-label" id="step-label"></div>
    <div class="milestone" id="milestone"></div>
    <div class="pi-display" id="pi-display"></div>
    <div class="input-row">
      <input type="text" id="digit-input" maxlength="5" placeholder="_ _ _ _ _" inputmode="numeric" autocomplete="off">
      <button class="submit-btn" id="submit-btn">Go</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- Victory Screen -->
  <div id="victory-screen" class="screen">
    <div style="font-size:3rem;margin-bottom:0.5rem;">&#x1F451;</div>
    <div class="victory-title">Claim the Crown of Code!</div>
    <p style="color:var(--muted);margin-top:0.5rem;">You have conquered Pi's challenge and become a legend.</p>
    <div class="victory-pi" id="victory-pi"></div>
    <button class="play-again" id="play-again">Play Again</button>
  </div>

  <!-- Data (swappable quest modules) -->
  <script src="js/data/chunks.js"></script>
  <script src="js/data/milestones.js"></script>
  <script src="js/data/deaths.js"></script>

  <!-- Engine -->
  <script src="js/audio.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/game.js"></script>

</body>
</html>
